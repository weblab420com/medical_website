<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Structure Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #ff9a9e, #fecfef);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            color: white;
            font-weight: bold;
        }

        .search-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .search-box {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: white;
        }

        .search-box:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.2);
        }

        .content {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .tree {
            font-family: 'Courier New', monospace;
            line-height: 1.6;
        }

        .tree-item {
            margin: 5px 0;
            transition: all 0.3s ease;
        }

        .tree-item.hidden {
            display: none;
        }

        .tree-toggle {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            font-size: 16px;
            margin-right: 5px;
            width: 20px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .tree-toggle:hover {
            transform: scale(1.2);
        }

        .tree-toggle.collapsed {
            transform: rotate(-90deg);
        }

        .tree-content {
            display: inline;
        }

        .tree-name {
            color: #333;
            font-weight: bold;
        }

        .tree-path {
            color: #666;
            font-weight: normal;
            margin-left: 10px;
        }

        .tree-description {
            color: #999;
            font-style: italic;
        }

        .level-0 { margin-left: 0; font-size: 18px; font-weight: bold; color: #2c3e50; }
        .level-1 { margin-left: 20px; font-size: 16px; color: #34495e; }
        .level-2 { margin-left: 40px; font-size: 15px; color: #5d6d7e; }
        .level-3 { margin-left: 60px; font-size: 14px; color: #7f8c8d; }
        .level-4 { margin-left: 80px; font-size: 13px; color: #95a5a6; }

        .highlight {
            background: linear-gradient(120deg, #ffecd2 0%, #fcb69f 100%);
            padding: 2px 6px;
            border-radius: 5px;
            animation: pulse 1s ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .children {
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .children.collapsed {
            max-height: 0;
            opacity: 0;
        }

        .expand-all-btn, .collapse-all-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            margin: 10px 10px 20px 0;
            transition: all 0.3s ease;
        }

        .expand-all-btn:hover, .collapse-all-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .breadcrumb {
            background: #f8f9fa;
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #666;
        }

        @media (max-width: 768px) {
            .dashboard {
                padding: 10px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

        let collapsedItems = new Set();
        let totalPages = 0;
        let maxDepth = 0;

        function countPages(node, depth = 0) {
            totalPages++;
            maxDepth = Math.max(maxDepth, depth);
            if (node.children) {
                node.children.forEach(child => countPages(child, depth + 1));
            }
        }

        function updateStats() {
            countPages(siteStructure);
            document.getElementById('total-pages').textContent = totalPages;
            document.getElementById('main-sections').textContent = siteStructure.children.length;
            document.getElementById('max-depth').textContent = maxDepth;
            document.getElementById('visible-items').textContent = document.querySelectorAll('.tree-item:not(.hidden)').length;
        }

        function createTreeHTML(node, level = 0, parentPath = '') {
            const fullPath = parentPath + node.path;
            const hasChildren = node.children && node.children.length > 0;
            const isCollapsed = collapsedItems.has(fullPath);
            
            let html = `<div class="tree-item level-${level}" data-path="${fullPath}" data-name="${node.name.toLowerCase()}">`;
            
            if (hasChildren) {
                html += `<button class="tree-toggle ${isCollapsed ? 'collapsed' : ''}" onclick="toggleItem('${fullPath}')">▼</button>`;
            } else {
                html += '<span style="width: 20px; display: inline-block;"></span>';
            }
            
            html += `<span class="tree-content">`;
            html += `<span class="tree-name">${node.name}</span>`;
            html += `<span class="tree-path"> – ${node.path}</span>`;
            if (node.description) {
                html += ` <span class="tree-description">(${node.description})</span>`;
            }
            html += `</span></div>`;
            
            if (hasChildren) {
                html += `<div class="children ${isCollapsed ? 'collapsed' : ''}" id="children-${fullPath.replace(/[^a-zA-Z0-9]/g, '_')}">`;
                node.children.forEach(child => {
                    html += createTreeHTML(child, level + 1, fullPath);
                });
                html += '</div>';
            }
            
            return html;
        }

        function toggleItem(path) {
            const isCollapsed = collapsedItems.has(path);
            const button = document.querySelector(`[data-path="${path}"] .tree-toggle`);
            const children = document.getElementById(`children-${path.replace(/[^a-zA-Z0-9]/g, '_')}`);
            
            if (isCollapsed) {
                collapsedItems.delete(path);
                button.classList.remove('collapsed');
                children.classList.remove('collapsed');
            } else {
                collapsedItems.add(path);
                button.classList.add('collapsed');
                children.classList.add('collapsed');
            }
            
            updateStats();
        }

        function expandAll() {
            collapsedItems.clear();
            document.querySelectorAll('.tree-toggle').forEach(btn => btn.classList.remove('collapsed'));
            document.querySelectorAll('.children').forEach(children => children.classList.remove('collapsed'));
            updateStats();
        }

        function collapseAll() {
            document.querySelectorAll('[data-path]').forEach(item => {
                const path = item.dataset.path;
                if (document.querySelector(`#children-${path.replace(/[^a-zA-Z0-9]/g, '_')}`)) {
                    collapsedItems.add(path);
                }
            });
            document.querySelectorAll('.tree-toggle').forEach(btn => btn.classList.add('collapsed'));
            document.querySelectorAll('.children').forEach(children => children.classList.add('collapsed'));
            updateStats();
        }

        function searchTree() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const items = document.querySelectorAll('.tree-item');
            
            items.forEach(item => {
                const name = item.dataset.name;
                const path = item.dataset.path.toLowerCase();
                
                if (searchTerm === '' || name.includes(searchTerm) || path.includes(searchTerm)) {
                    item.classList.remove('hidden');
                    
                    // Highlight matching text
                    const nameElement = item.querySelector('.tree-name');
                    const pathElement = item.querySelector('.tree-path');
                    
                    if (searchTerm !== '') {
                        const nameText = nameElement.textContent;
                        const pathText = pathElement.textContent;
                        
                        if (nameText.toLowerCase().includes(searchTerm)) {
                            nameElement.innerHTML = nameText.replace(
                                new RegExp(`(${searchTerm})`, 'gi'),
                                '<span class="highlight">$1</span>'
                            );
                        }
                        
                        if (pathText.toLowerCase().includes(searchTerm)) {
                            pathElement.innerHTML = pathText.replace(
                                new RegExp(`(${searchTerm})`, 'gi'),
                                '<span class="highlight">$1</span>'
                            );
                        }
                    } else {
                        // Reset highlighting
                        nameElement.innerHTML = nameElement.textContent;
                        pathElement.innerHTML = pathElement.textContent;
                    }
                } else {
                    item.classList.add('hidden');
                }
            });
            
            updateStats();
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('siteTree').innerHTML = createTreeHTML(siteStructure);
            updateStats();
            
            document.getElementById('searchInput').addEventListener('input', searchTree);
        });
    </script>
</body>
</html>
